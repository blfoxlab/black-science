<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Кабінет вчителя - Black Science</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar/theme.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar/styles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar/teacher.css') }}" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-dot"></span>Black Science Teacher</div>
      <div class="sub">Перегляд усіх бронювань по даті та часу</div>
    </header>

    <main class="teacher-layout">
      <section class="panel">
        <div class="controls teacher-controls">
          <label class="control">
            <span>Вчитель</span>
            <select id="teacherSelect"></select>
          </label>

          <label class="control">
            <span>Дата</span>
            <input id="dateInput" type="date" />
          </label>

          <div class="status" id="statusText">Оберіть вчителя</div>
        </div>

        <div class="calendar">
          <div class="calendar-header">Розклад на день</div>
          <div id="daySchedule" class="day-schedule"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="section-title">Всі бронювання</div>
        <div id="allBookings" class="booking-list"></div>
      </aside>
    </main>
  </div>

  <script src="{{ url_for('static', filename='java/calendar/teacher.js') }}"></script>
</body>
</html>
