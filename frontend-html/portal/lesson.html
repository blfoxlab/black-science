<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal/main.css') }}" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        svg: { fontCache: "global" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <div class="bg"></div>
    <header class="top">
      <div class="brand">
        <span class="dot"></span>
        Black Science
      </div>
      <nav class="nav">
        <a href="{{ back_url }}">{{ back_label }}</a>
        <a href="{{ url_for('courses') }}">Курси</a>
      </nav>
    </header>

    <main class="container narrow">
      <article class="content-page {{ render_mode|default('default') }}-content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
